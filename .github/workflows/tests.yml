# DEBUG BRANCH ONLY (debug-gpt5-repro): temporarily replaces the test matrix
# with a single gpt-5 reproduction job for issue #255. Never merged to main.
name: Tests and Linting

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  gpt5-debug:
    name: GPT-5 Debug Repro (issue 255)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Generate locked constraints
        run: uv export --locked --no-emit-project --no-hashes --all-extras -o /tmp/constraints.txt

      - name: Install dependencies
        run: uv pip install --system -e '.[dev]' --constraint /tmp/constraints.txt

      - name: Run gpt-5 repro
        run: python .github/tests/gpt5_debug.py
