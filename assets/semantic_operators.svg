<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 210" font-family="Arial, Helvetica, sans-serif" font-size="12.5">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#777"/>
    </marker>
  </defs>

  <line x1="280" y1="18" x2="280" y2="188" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="560" y1="18" x2="560" y2="188" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="840" y1="18" x2="840" y2="188" stroke="#e8e8e8" stroke-width="1"/>

  <!-- ============ Semantic Projection (sem_map) ============ -->
  <g transform="translate(0,0)">
    <text x="140" y="24" text-anchor="middle" font-weight="700" fill="#111">Semantic Projection</text>
    <!-- 3 input docs -->
    <rect x="16" y="52" width="44" height="26" rx="5" fill="#eaf0fb" stroke="#4a72b0"/><text x="38" y="69" text-anchor="middle" fill="#111">doc</text>
    <rect x="16" y="86" width="44" height="26" rx="5" fill="#eaf0fb" stroke="#4a72b0"/><text x="38" y="103" text-anchor="middle" fill="#111">doc</text>
    <rect x="16" y="120" width="44" height="26" rx="5" fill="#eaf0fb" stroke="#4a72b0"/><text x="38" y="137" text-anchor="middle" fill="#111">doc</text>
    <!-- arrows in -->
    <line x1="62" y1="65" x2="112" y2="90" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="62" y1="99" x2="112" y2="99" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="62" y1="133" x2="112" y2="108" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <!-- LM -->
    <rect x="114" y="77" width="46" height="44" rx="12" fill="#fdebd0" stroke="#e08a2e"/><text x="137" y="103" text-anchor="middle" font-weight="600" fill="#111">LM</text>
    <!-- arrows out -->
    <line x1="162" y1="90" x2="212" y2="65" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="162" y1="99" x2="212" y2="99" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="162" y1="108" x2="212" y2="133" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <!-- 3 outputs -->
    <rect x="214" y="52" width="52" height="26" rx="5" fill="#e6f4ea" stroke="#34a853"/><text x="240" y="69" text-anchor="middle" fill="#111">result</text>
    <rect x="214" y="86" width="52" height="26" rx="5" fill="#e6f4ea" stroke="#34a853"/><text x="240" y="103" text-anchor="middle" fill="#111">result</text>
    <rect x="214" y="120" width="52" height="26" rx="5" fill="#e6f4ea" stroke="#34a853"/><text x="240" y="137" text-anchor="middle" fill="#111">result</text>
    <text x="140" y="176" text-anchor="middle" font-size="11" fill="#666">sem_map — transform each record</text>
  </g>

  <!-- ============ Semantic Filter (sem_filter) ============ -->
  <g transform="translate(280,0)">
    <text x="140" y="24" text-anchor="middle" font-weight="700" fill="#111">Semantic Filtering</text>
    <rect x="16" y="52" width="44" height="26" rx="5" fill="#eaf0fb" stroke="#4a72b0"/><text x="38" y="69" text-anchor="middle" fill="#111">doc</text>
    <rect x="16" y="86" width="44" height="26" rx="5" fill="#eaf0fb" stroke="#4a72b0"/><text x="38" y="103" text-anchor="middle" fill="#111">doc</text>
    <rect x="16" y="120" width="44" height="26" rx="5" fill="#eaf0fb" stroke="#4a72b0"/><text x="38" y="137" text-anchor="middle" fill="#111">doc</text>
    <line x1="62" y1="65" x2="112" y2="90" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="62" y1="99" x2="112" y2="99" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="62" y1="133" x2="112" y2="108" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <rect x="114" y="77" width="46" height="44" rx="12" fill="#fdebd0" stroke="#e08a2e"/><text x="137" y="103" text-anchor="middle" font-weight="600" fill="#111">LM</text>
    <!-- kept (2) + dropped (1, faded) -->
    <line x1="162" y1="94" x2="212" y2="69" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="162" y1="104" x2="212" y2="103" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <rect x="214" y="56" width="52" height="26" rx="5" fill="#e6f4ea" stroke="#34a853"/><text x="240" y="73" text-anchor="middle" fill="#111">kept</text>
    <rect x="214" y="90" width="52" height="26" rx="5" fill="#e6f4ea" stroke="#34a853"/><text x="240" y="107" text-anchor="middle" fill="#111">kept</text>
    <rect x="214" y="124" width="52" height="26" rx="5" fill="#f2f2f2" stroke="#c4c4c4" stroke-dasharray="3 2"/><text x="240" y="141" text-anchor="middle" fill="#999">dropped</text>
    <text x="140" y="176" text-anchor="middle" font-size="11" fill="#666">sem_filter — keep records matching a predicate</text>
  </g>

  <!-- ============ Semantic Aggregation (sem_agg) ============ -->
  <g transform="translate(560,0)">
    <text x="140" y="24" text-anchor="middle" font-weight="700" fill="#111">Semantic Aggregation (Reduce)</text>
    <rect x="16" y="52" width="44" height="26" rx="5" fill="#eaf0fb" stroke="#4a72b0"/><text x="38" y="69" text-anchor="middle" fill="#111">doc</text>
    <rect x="16" y="86" width="44" height="26" rx="5" fill="#eaf0fb" stroke="#4a72b0"/><text x="38" y="103" text-anchor="middle" fill="#111">doc</text>
    <rect x="16" y="120" width="44" height="26" rx="5" fill="#eaf0fb" stroke="#4a72b0"/><text x="38" y="137" text-anchor="middle" fill="#111">doc</text>
    <line x1="62" y1="65" x2="118" y2="92" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="62" y1="99" x2="118" y2="99" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="62" y1="133" x2="118" y2="106" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <rect x="120" y="77" width="46" height="44" rx="12" fill="#fdebd0" stroke="#e08a2e"/><text x="143" y="103" text-anchor="middle" font-weight="600" fill="#111">LM</text>
    <line x1="168" y1="99" x2="196" y2="99" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <rect x="198" y="83" width="66" height="32" rx="5" fill="#e6f4ea" stroke="#34a853"/><text x="231" y="103" text-anchor="middle" fill="#111">1 result</text>
    <text x="140" y="176" text-anchor="middle" font-size="11" fill="#666">sem_agg — combine many records into one</text>
  </g>

  <!-- ============ Semantic Join (sem_join) ============ -->
  <g transform="translate(840,0)">
    <text x="140" y="24" text-anchor="middle" font-weight="700" fill="#111">Semantic Join</text>
    <!-- Set A (3 docs) -->
    <text x="34" y="46" text-anchor="middle" font-size="10" fill="#4a72b0">set A</text>
    <rect x="12" y="50" width="40" height="20" rx="4" fill="#eaf0fb" stroke="#4a72b0"/><text x="32" y="64" text-anchor="middle" font-size="11" fill="#111">doc</text>
    <rect x="12" y="72" width="40" height="20" rx="4" fill="#eaf0fb" stroke="#4a72b0"/><text x="32" y="86" text-anchor="middle" font-size="11" fill="#111">doc</text>
    <rect x="12" y="94" width="40" height="20" rx="4" fill="#eaf0fb" stroke="#4a72b0"/><text x="32" y="108" text-anchor="middle" font-size="11" fill="#111">doc</text>
    <!-- Set B (3 docs) -->
    <text x="88" y="46" text-anchor="middle" font-size="10" fill="#4a72b0">set B</text>
    <rect x="66" y="50" width="40" height="20" rx="4" fill="#eef3ea" stroke="#7a9a5a"/><text x="86" y="64" text-anchor="middle" font-size="11" fill="#111">doc</text>
    <rect x="66" y="72" width="40" height="20" rx="4" fill="#eef3ea" stroke="#7a9a5a"/><text x="86" y="86" text-anchor="middle" font-size="11" fill="#111">doc</text>
    <rect x="66" y="94" width="40" height="20" rx="4" fill="#eef3ea" stroke="#7a9a5a"/><text x="86" y="108" text-anchor="middle" font-size="11" fill="#111">doc</text>
    <!-- arrows to LM -->
    <line x1="108" y1="72" x2="150" y2="95" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="108" y1="92" x2="150" y2="103" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <rect x="152" y="78" width="46" height="44" rx="12" fill="#fdebd0" stroke="#e08a2e"/><text x="175" y="104" text-anchor="middle" font-weight="600" fill="#111">LM</text>
    <line x1="200" y1="100" x2="222" y2="100" stroke="#777" stroke-width="1.4" marker-end="url(#arrow)"/>
    <rect x="224" y="84" width="50" height="34" rx="5" fill="#e6f4ea" stroke="#34a853"/><text x="249" y="98" text-anchor="middle" font-size="10.5" fill="#111">matched</text><text x="249" y="110" text-anchor="middle" font-size="10.5" fill="#111">pairs</text>
    <text x="140" y="176" text-anchor="middle" font-size="11" fill="#666">sem_join — join two sets on a predicate</text>
  </g>
</svg>
